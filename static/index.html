<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>MillionUnblocks</title>
    <link docIcon rel="icon" href="./unblock.png">
    <meta name="description" content="MillionUnblocks is a proxy you can use to unblock websites or searcht web with privacy." />
    <meta name="keywords" content="proxy, web proxy, service workers, unblock websites, unblock chromebook, free web proxy, proxy list, proxy sites, unblock chromebook, online proxy, proxy server, proxysite, proxy youtube, bypass securly, bypass iboss, bypass lightspeed filter, chromebooks, unblock youtube, youtube proxy, unblocked youtube, youtube unblocked">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#434c5e">
    <meta name="googlebot" content="index, follow, snippet" />
    <link href="index.css" rel="stylesheet">
    <script src="/scripts/bundle.js" defer></script>
    <script src="/scripts/config.js" defer></script>
    <script src="/index.js" defer></script>
    <link rel="stylesheet" href="./css/all.css">
</head>

<body>
    <div class="logo-wrapper">
        <img class="logo" src="./unblock.png" alt="" />
        <h1>MillionUnblocks</h1>
    </div>

    <div class="desc">
        <p>Access unblocked websites or browse the web with a different IP</p>
    </div>

    <form>
        <input placeholder="Search Google or Enter a URL">
    </form>

    <div credits>
        <p>Created by Millionxsam</p>
        <div class="links">
            <a discord><i class="fa-brands fa-discord"></i></a>
            <a github href="https://github.com/millionxsam" rel="noopener" target="_blank"><i class="fa-brands fa-github"></i></a>
        </div>
    </div>

    <style>

        .logo-wrapper {
            margin-top: 5%;
        }

        [credits] {
            justify-content: center;
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        [credits] a {
            color: white;
            cursor: pointer;
        }

        [credits] p {
            color: white;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        [credits] .links {
            justify-content: center;
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        [credits] .links [discord] {
            color: #7289DA;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        [credits] .links [github] {
            color: #6e5494;
            transition: all 0.3s ease;
        }
        
        [credits] .links [discord]:hover {
            color: #7289da91;
            margin-top: 0.15rem;
        }
        
        [credits] .links [github]:hover {
            color: #6e549496;
            margin-top: 0.15rem;
        }
        
        [credits] .links [discord] i {
            font-size: 30px;
        }
        
        [credits] .links [github] i {
            font-size: 30px;
        }
    </style>

    <script>
        document.querySelector('[discord]').addEventListener('click', () => {
            navigator.clipboard.writeText('millionxsam#4967').then(() => alert('Discord username copied'));
        })
    </script>

    <div class="disguise-container">
        <h1>Disguise Settings</h1>
        <p>Set the name and icon you want for this tab. This is useful if someone is walking by you and they don't see an unblocker tab open.</p>
        <div class="settings">
            <div name>
                <h1>Name</h1>
                <input placeholder="E.g. New Tab" type="text">
            </div>
            <div icon>
                <h1>Icon URL</h1>
                <input placeholder="URL of your icon" type="text">
            </div>
        </div>
    </div>

    <style>
        .disguise-container {
            display: flex;
            margin-top: 5vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .disguise-container h1, .disguise-container p {
            text-align: center;
            color: white;
            max-width: 90vh;
        }

        .disguise-container .settings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10vw;
        }

        .disguise-container input {
            background-color: #111;
            border: 2px solid rgb(255, 255, 255, .2);
            padding: .5vh;
            border-radius: 10px;
            color: white;
        }
    </style>

    <script>
        const nameInput = document.querySelector('.settings [name] input');
        const docTitle = document.getElementsByTagName('title')[0];

        const iconInput = document.querySelector('.settings [icon] input');
        const docIcon = document.querySelector('[docIcon]');

        nameInput.value = localStorage.getItem('name') || '';
        docTitle.innerHTML = localStorage.getItem('name') || 'MillionUnblocks';

        nameInput.addEventListener('input', () => {
            docTitle.innerHTML = nameInput.value || 'MillionUnblocks';
            if(nameInput.value) localStorage.setItem('name', nameInput.value)
            else localStorage.removeItem('name');
        })
        
        
        iconInput.value = localStorage.getItem('icon') || '';
        docIcon.href = localStorage.getItem('icon') || './unblock.png';

        iconInput.addEventListener('input', () => {
            if(iconInput.value && !iconInput.value.startsWith('https://')) iconInput.value = `https://${iconInput.value}`;
            docIcon.href = iconInput.value || './unblock.png';
            if(iconInput.value) localStorage.setItem('icon', iconInput.value)
            else localStorage.removeItem('icon');
        })
    </script>
</body>
</html>
